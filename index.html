<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KCNX Web OS</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ───────────── RESET & BASE ───────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ───────────── SCREENS ───────────── */
        .screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 0;
            transform: scale(1.02);
            pointer-events: none;
            z-index: 1;
            background: #0a0a0f;
        }
        .screen.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            z-index: 10;
        }
        .screen.exit {
            opacity: 0;
            transform: scale(0.98);
            pointer-events: none;
            z-index: 1;
        }

        /* ───────────── BOOT SCREEN ───────────── */
        #bootScreen {
            background: #0a0a0f;
            flex-direction: column;
            gap: 40px;
        }
        #bootScreen .boot-logo {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc, #00d4ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradShift 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.15));
        }
        @keyframes gradShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        #bootScreen .boot-sub {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 8px;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
        }
        #bootScreen .boot-hint {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 3px;
            animation: pulseHint 2s ease-in-out infinite;
        }
        @keyframes pulseHint {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.9;
            }
        }
        #bootScreen .boot-keys {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }
        #bootScreen .boot-keys kbd {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }
        .boot-loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .boot-loading-bar.active {
            opacity: 1;
        }
        .boot-loading-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc);
            border-radius: 4px;
            transition: width 0.15s linear;
        }

        /* ───────────── WELCOME SCREEN ───────────── */
        #welcomeScreen {
            background: #ffffff;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }
        #welcomeScreen .welcome-wrapper {
            max-width: 800px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        /* Hand‑writing style – no hand, just stroke effect */
        .handwrite {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: 700;
            font-size: clamp(52px, 12vw, 110px);
            color: #1a1a2e;
            letter-spacing: 2px;
            line-height: 1.2;
            position: relative;
            display: inline-block;
        }
        .handwrite .char {
            display: inline-block;
            opacity: 0;
            transform: scale(0.6) rotate(-8deg);
            animation: handWriteIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: center;
        }
        .handwrite .char:nth-child(1) {
            animation-delay: 0.00s;
        }
        .handwrite .char:nth-child(2) {
            animation-delay: 0.08s;
        }
        .handwrite .char:nth-child(3) {
            animation-delay: 0.16s;
        }
        .handwrite .char:nth-child(4) {
            animation-delay: 0.24s;
        }
        .handwrite .char:nth-child(5) {
            animation-delay: 0.32s;
        }
        .handwrite .char:nth-child(6) {
            animation-delay: 0.40s;
        }
        .handwrite .char:nth-child(7) {
            animation-delay: 0.48s;
        }
        .handwrite .char:nth-child(8) {
            animation-delay: 0.56s;
        }
        .handwrite .char:nth-child(9) {
            animation-delay: 0.64s;
        }
        .handwrite .char:nth-child(10) {
            animation-delay: 0.72s;
        }
        .handwrite .char:nth-child(11) {
            animation-delay: 0.80s;
        }
        .handwrite .char:nth-child(12) {
            animation-delay: 0.88s;
        }
        .handwrite .char:nth-child(13) {
            animation-delay: 0.96s;
        }
        .handwrite .char:nth-child(14) {
            animation-delay: 1.04s;
        }
        .handwrite .char:nth-child(15) {
            animation-delay: 1.12s;
        }
        .handwrite .char:nth-child(16) {
            animation-delay: 1.20s;
        }
        .handwrite .char:nth-child(17) {
            animation-delay: 1.28s;
        }
        .handwrite .char:nth-child(18) {
            animation-delay: 1.36s;
        }
        .handwrite .char:nth-child(19) {
            animation-delay: 1.44s;
        }
        .handwrite .char:nth-child(20) {
            animation-delay: 1.52s;
        }

        @keyframes handWriteIn {
            0% {
                opacity: 0;
                transform: scale(0.6) rotate(-8deg) translateY(12px);
            }
            60% {
                opacity: 1;
                transform: scale(1.05) rotate(1deg) translateY(0);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg) translateY(0);
            }
        }

        .handwrite-sub {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: 400;
            font-size: clamp(22px, 4vw, 42px);
            color: #2d2d44;
            letter-spacing: 6px;
            margin-top: 4px;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.6s forwards;
        }
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Next button – blue, corner */
        .btn-next {
            position: fixed;
            bottom: 48px;
            right: 48px;
            background: #1a73e8;
            border: none;
            border-radius: 60px;
            padding: 16px 44px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(26, 115, 232, 0.35);
            transition: all 0.25s ease;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            z-index: 20;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: btnReveal 0.6s ease 2.0s forwards;
        }
        .btn-next:hover {
            background: #1557b0;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 36px rgba(26, 115, 232, 0.45);
        }
        .btn-next:active {
            transform: scale(0.96);
        }
        .btn-next i {
            font-size: 20px;
            transition: transform 0.3s;
        }
        .btn-next:hover i {
            transform: translateX(4px);
        }
        @keyframes btnReveal {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ───────────── LOADER SCREEN ───────────── */
        #loaderScreen {
            background: #0a0a0f;
            flex-direction: column;
            gap: 48px;
        }
        .loader-spinner {
            width: 72px;
            height: 72px;
            position: relative;
        }
        .loader-spinner .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #ffffff;
            border-right-color: rgba(255, 255, 255, 0.2);
            animation: spinRing 1s cubic-bezier(0.6, 0.0, 0.4, 1.0) infinite;
        }
        .loader-spinner .ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: rgba(255, 255, 255, 0.4);
            border-right-color: transparent;
            animation-duration: 1.4s;
            animation-direction: reverse;
        }
        .loader-spinner .ring:nth-child(3) {
            width: 56%;
            height: 56%;
            top: 22%;
            left: 22%;
            border-top-color: rgba(255, 255, 255, 0.15);
            border-right-color: rgba(255, 255, 255, 0.05);
            animation-duration: 0.8s;
        }
        @keyframes spinRing {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        #loaderScreen .loader-text {
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
        }

        /* ───────────── DUBAI SCREEN ───────────── */
        #dubaiScreen {
            background: #000;
            padding: 0;
            overflow: hidden;
        }
        #dubaiScreen .dubai-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        #dubaiScreen .dubai-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;   /* fill screen, crop if needed */
            background: #000;
            display: block;
        }
        /* Time/Date overlay - bottom right */
        .datetime-overlay {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            padding: 10px 22px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.5px;
            z-index: 20;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .datetime-overlay .date-part {
            font-weight: 300;
            font-size: 15px;
            opacity: 0.7;
        }
        .datetime-overlay .time-part {
            font-weight: 600;
            font-size: 20px;
        }

        /* swipe hint */
        .swipe-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.15);
            z-index: 5;
            animation: pulseHint 2.5s ease-in-out infinite;
            pointer-events: none;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .swipe-hint i {
            margin-right: 8px;
        }

        /* ───────────── SIGN IN SCREEN ───────────── */
        #signinScreen {
            background: #ffffff;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
        }
        #signinScreen .signin-box {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        #signinScreen .signin-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        #signinScreen .signin-sub {
            font-size: 15px;
            color: #6b6b80;
            font-weight: 400;
            margin-bottom: 32px;
        }
        #signinScreen .signin-title span {
            background: linear-gradient(135deg, #1a73e8, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .signin-field {
            margin-bottom: 20px;
            position: relative;
        }
        .signin-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #3d3d54;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .signin-field input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 400;
            border: 1.5px solid #e8e8f0;
            border-radius: 14px;
            background: #f8f8fc;
            color: #1a1a2e;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        .signin-field input:focus {
            border-color: #1a73e8;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.08);
        }
        .signin-field input::placeholder {
            color: #a8a8bd;
            font-weight: 300;
        }
        .signin-actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }
        .btn-signin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            background: #1a73e8;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.25);
        }
        .btn-signin:hover {
            background: #1557b0;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(26, 115, 232, 0.35);
        }
        .btn-signin:active {
            transform: scale(0.97);
        }
        .btn-create {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            background: #34a853;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(52, 168, 83, 0.25);
        }
        .btn-create:hover {
            background: #2d9248;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(52, 168, 83, 0.35);
        }
        .btn-create:active {
            transform: scale(0.97);
        }
        .signin-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 12px 0 6px;
        }
        .signin-divider::before,
        .signin-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8f0;
        }
        .signin-divider span {
            font-size: 13px;
            color: #9a9ab0;
            font-weight: 400;
            white-space: nowrap;
        }
        .signin-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #8a8aa0;
        }
        .signin-footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }
        .signin-footer a:hover {
            text-decoration: underline;
        }

        /* ───────────── RESPONSIVE ───────────── */
        @media (max-width: 600px) {
            #bootScreen .boot-logo {
                font-size: 44px;
                letter-spacing: 4px;
            }
            #bootScreen .boot-sub {
                font-size: 13px;
                letter-spacing: 5px;
            }
            #bootScreen .boot-keys kbd {
                padding: 6px 14px;
                font-size: 13px;
            }
            .btn-next {
                bottom: 28px;
                right: 28px;
                padding: 14px 28px;
                font-size: 15px;
            }
            #signinScreen .signin-box {
                padding: 32px 20px 28px;
                border-radius: 24px;
            }
            #signinScreen .signin-title {
                font-size: 22px;
            }
            .handwrite {
                font-size: clamp(38px, 10vw, 64px);
            }
            .handwrite-sub {
                font-size: clamp(18px, 3.5vw, 28px);
            }
            .swipe-hint {
                font-size: 11px;
                padding: 6px 16px;
                bottom: 80px;
            }
            .datetime-overlay {
                bottom: 20px;
                right: 20px;
                font-size: 14px;
                padding: 6px 14px;
                gap: 10px;
                flex-direction: column;
                align-items: flex-end;
            }
            .datetime-overlay .time-part {
                font-size: 18px;
            }
            .datetime-overlay .date-part {
                font-size: 12px;
            }
        }
        @media (max-width: 400px) {
            .btn-next {
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
                font-size: 13px;
            }
            .btn-next i {
                font-size: 16px;
            }
            #signinScreen .signin-box {
                padding: 24px 16px 20px;
            }
        }

        /* ───────────── UTILITY ───────────── */
        .hidden {
            display: none !important;
        }
        .no-transition {
            transition: none !important;
        }
    </style>
</head>
<body>

    <!-- ====== BOOT SCREEN ====== -->
    <div id="bootScreen" class="screen active">
        <div class="boot-logo">KCNX</div>
        <div class="boot-sub">Web OS</div>
        <div class="boot-hint">press <kbd style="background:rgba(255,255,255,0.06);padding:2px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.08);font-weight:600;color:rgba(255,255,255,0.5);">Enter</kbd> or <kbd style="background:rgba(255,255,255,0.06);padding:2px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.08);font-weight:600;color:rgba(255,255,255,0.5);">F2</kbd> to boot</div>
        <div class="boot-loading-bar" id="bootLoadingBar">
            <div class="fill" id="bootLoadingFill"></div>
        </div>
    </div>

    <!-- ====== WELCOME SCREEN ====== -->
    <div id="welcomeScreen" class="screen">
        <div class="welcome-wrapper">
            <div class="handwrite" id="welcomeHand">
                <!-- "Welcome" injected by JS -->
            </div>
            <div class="handwrite-sub" id="toKcnxHand">
                <!-- "To KCNX" injected -->
            </div>
        </div>
        <button class="btn-next" id="btnNext">
            Next <i class="fas fa-arrow-right"></i>
        </button>
    </div>

    <!-- ====== LOADER SCREEN ====== -->
    <div id="loaderScreen" class="screen">
        <div class="loader-spinner">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>
        <div class="loader-text">Loading&hellip;</div>
        <!-- audio element for bg music (plays during loader) -->
        <audio id="bgMusic" loop preload="auto">
            <source src="https://res.cloudinary.com/ccmt3psw/video/upload/v1783824981/pc_sound_wav1_fousnh.mp3" type="audio/mpeg" />
        </audio>
    </div>

    <!-- ====== DUBAI SCREEN ====== -->
    <div id="dubaiScreen" class="screen">
        <div class="dubai-wrapper">
            <!-- Video element: full background, no controls, autoplay, loop, muted -->
            <video id="dubaiVideo" autoplay muted loop playsinline preload="auto">
                <source src="https://res.cloudinary.com/ccmt3psw/video/upload/souce_pexel_user_Abid_Ali_n3xaqg.mp4" type="video/mp4" />
                Your browser does not support the video tag.
            </video>
        </div>
        <!-- Time/Date overlay - bottom right -->
        <div class="datetime-overlay" id="datetimeDisplay">
            <span class="date-part" id="datePart">---</span>
            <span class="time-part" id="timePart">--:--:--</span>
        </div>
        <div class="swipe-hint">
            <i class="fas fa-chevron-left"></i> swipe left &nbsp;·&nbsp; <kbd style="background:transparent;border:1px solid rgba(255,255,255,0.1);padding:2px 10px;border-radius:4px;color:rgba(255,255,255,0.3);font-size:12px;">←</kbd>
        </div>
    </div>

    <!-- ====== SIGN IN SCREEN ====== -->
    <div id="signinScreen" class="screen">
        <div class="signin-box">
            <div class="signin-title">SIGN IN TO <span>KCNX</span></div>
            <div class="signin-sub">Welcome back. Enter your credentials to continue.</div>

            <div class="signin-field">
                <label for="signinEmail">Email or phone</label>
                <input type="email" id="signinEmail" placeholder="you@example.com" />
            </div>
            <div class="signin-field">
                <label for="signinPassword">Password</label>
                <input type="password" id="signinPassword" placeholder="••••••••" />
            </div>

            <div class="signin-actions">
                <button class="btn-signin" id="btnSignin">Sign In</button>
                <div class="signin-divider"><span>or</span></div>
                <button class="btn-create" id="btnCreate">Create Account</button>
            </div>
            <div class="signin-footer">
                <a href="#" id="forgotLink">Forgot password?</a> &nbsp;·&nbsp; <a href="#" id="helpLink">Help</a>
            </div>
        </div>
    </div>

    <!-- ====== JAVASCRIPT ====== -->
    <script>
        (function() {
            'use strict';

            // ─── DOM refs ──────────────────────────────────────
            const bootScreen = document.getElementById('bootScreen');
            const welcomeScreen = document.getElementById('welcomeScreen');
            const loaderScreen = document.getElementById('loaderScreen');
            const dubaiScreen = document.getElementById('dubaiScreen');
            const signinScreen = document.getElementById('signinScreen');

            const bootLoadingBar = document.getElementById('bootLoadingBar');
            const bootLoadingFill = document.getElementById('bootLoadingFill');

            const btnNext = document.getElementById('btnNext');
            const bgMusic = document.getElementById('bgMusic');

            const welcomeHand = document.getElementById('welcomeHand');
            const toKcnxHand = document.getElementById('toKcnxHand');

            const datePart = document.getElementById('datePart');
            const timePart = document.getElementById('timePart');

            // ─── State ──────────────────────────────────────────
            let bootCompleted = false;
            let loaderActive = false;
            let musicStarted = false;
            let dubaiActive = false;
            let signinActive = false;
            let swipeEnabled = false;

            // ─── Helpers ────────────────────────────────────────

            function showScreen(screen) {
                document.querySelectorAll('.screen').forEach(s => {
                    s.classList.remove('active', 'exit');
                });
                screen.classList.add('active');
            }

            function exitScreen(screen) {
                screen.classList.remove('active');
                screen.classList.add('exit');
            }

            // ─── Boot sequence ──────────────────────────────────

            function startBoot() {
                if (bootCompleted) return;
                bootCompleted = true;

                bootLoadingBar.classList.add('active');
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 2 + Math.random() * 5;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                        setTimeout(() => {
                            exitScreen(bootScreen);
                            showScreen(welcomeScreen);
                            animateWelcome();
                        }, 300);
                    }
                    bootLoadingFill.style.width = Math.min(progress, 100) + '%';
                }, 80);
            }

            // ─── Welcome hand‑write animation ──────────────────

            function animateWelcome() {
                const words = [
                    { el: welcomeHand, text: 'Welcome', delayBase: 0 },
                    { el: toKcnxHand, text: 'To KCNX', delayBase: 1.4 }
                ];

                words.forEach(({ el, text, delayBase }) => {
                    el.innerHTML = '';
                    const chars = text.split('');
                    chars.forEach((ch, i) => {
                        const span = document.createElement('span');
                        span.className = 'char';
                        span.textContent = ch === ' ' ? '\u00A0' : ch;
                        span.style.animationDelay = (delayBase + i * 0.08) + 's';
                        el.appendChild(span);
                    });
                });

                // ensure next button visible (CSS animation already handles)
                const nextBtn = document.getElementById('btnNext');
                nextBtn.style.opacity = '1';
                nextBtn.style.transform = 'translateY(0) scale(1)';
            }

            // ─── Loader & transition to Dubai ──────────────────

            function startLoaderAndDubai() {
                if (loaderActive) return;
                loaderActive = true;

                exitScreen(welcomeScreen);
                showScreen(loaderScreen);

                // start music
                if (!musicStarted) {
                    bgMusic.volume = 0.5;
                    bgMusic.play().catch(() => {});
                    musicStarted = true;
                }

                // simulate loading 3.5s → Dubai
                setTimeout(() => {
                    bgMusic.pause();
                    bgMusic.currentTime = 0;
                    musicStarted = false;

                    exitScreen(loaderScreen);
                    showScreen(dubaiScreen);
                    dubaiActive = true;

                    // Start time/date updater
                    updateDateTime();
                    const intervalId = setInterval(updateDateTime, 1000);
                    // store interval for cleanup
                    window.__dateInterval = intervalId;

                    // enable swipe after short delay
                    setTimeout(() => {
                        enableSwipeToSignin();
                    }, 600);
                }, 3500);
            }

            // ─── DateTime updater ──────────────────────────────

            function updateDateTime() {
                const now = new Date();
                const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
                const dateStr = now.toLocaleDateString('en-US', options);
                const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit',
                    second: '2-digit' });
                if (datePart) datePart.textContent = dateStr;
                if (timePart) timePart.textContent = timeStr;
            }

            // ─── Swipe + keyboard to signin ────────────────────

            function enableSwipeToSignin() {
                if (swipeEnabled) return;
                swipeEnabled = true;

                const keyHandler = (e) => {
                    if (e.key === 'ArrowLeft' || e.key === 'Left') {
                        if (dubaiActive && !signinActive) {
                            e.preventDefault();
                            goToSignin();
                        }
                    }
                };
                document.addEventListener('keydown', keyHandler);

                let touchStartX = 0,
                    touchStartY = 0;
                const touchHandler = (e) => {
                    if (!dubaiActive || signinActive) return;
                    const touch = e.touches[0];
                    if (touch) {
                        touchStartX = touch.clientX;
                        touchStartY = touch.clientY;
                    }
                };
                const touchMoveHandler = (e) => {
                    if (!dubaiActive || signinActive) return;
                    if (touchStartX === 0) return;
                    const touch = e.touches[0];
                    if (!touch) return;
                    const dx = touch.clientX - touchStartX;
                    const dy = touch.clientY - touchStartY;
                    if (dx < -60 && Math.abs(dx) > Math.abs(dy) * 1.2) {
                        e.preventDefault();
                        goToSignin();
                    }
                };
                const touchEndHandler = () => {
                    touchStartX = 0;
                    touchStartY = 0;
                };

                document.addEventListener('touchstart', touchHandler, { passive: true });
                document.addEventListener('touchmove', touchMoveHandler, { passive: false });
                document.addEventListener('touchend', touchEndHandler, { passive: true });

                window.__swipeCleanup = () => {
                    document.removeEventListener('keydown', keyHandler);
                    document.removeEventListener('touchstart', touchHandler);
                    document.removeEventListener('touchmove', touchMoveHandler);
                    document.removeEventListener('touchend', touchEndHandler);
                };
            }

            function goToSignin() {
                if (signinActive) return;
                signinActive = true;
                exitScreen(dubaiScreen);
                showScreen(signinScreen);

                if (window.__swipeCleanup) {
                    window.__swipeCleanup();
                    window.__swipeCleanup = null;
                }
                swipeEnabled = false;
                // stop time/date updates if any
                if (window.__dateInterval) {
                    clearInterval(window.__dateInterval);
                    window.__dateInterval = null;
                }
            }

            // ─── Sign‑in button actions ────────────────────────

            document.getElementById('btnSignin').addEventListener('click', function(e) {
                e.preventDefault();
                const email = document.getElementById('signinEmail').value.trim();
                const pass = document.getElementById('signinPassword').value.trim();
                if (!email || !pass) {
                    const box = document.querySelector('.signin-box');
                    box.style.animation = 'none';
                    void box.offsetHeight;
                    box.style.animation = 'shake 0.4s ease';
                    return;
                }
                alert('Signed in as ' + email + ' (demo)');
            });

            document.getElementById('btnCreate').addEventListener('click', function(e) {
                e.preventDefault();
                alert('Create Account flow (demo)');
            });

            document.getElementById('forgotLink').addEventListener('click', function(e) {
                e.preventDefault();
                alert('Password reset link sent (demo)');
            });

            document.getElementById('helpLink').addEventListener('click', function(e) {
                e.preventDefault();
                alert('Help & Support (demo)');
            });

            // ─── Shake animation (injected) ────────────────────

            const styleShake = document.createElement('style');
            styleShake.textContent = `
                    @keyframes shake {
                        0%, 100% { transform: translateX(0); }
                        20% { transform: translateX(-8px); }
                        40% { transform: translateX(8px); }
                        60% { transform: translateX(-5px); }
                        80% { transform: translateX(5px); }
                    }
                `;
            document.head.appendChild(styleShake);

            // ─── Boot trigger: Enter or F2 ─────────────────────

            document.addEventListener('keydown', function bootTrigger(e) {
                if (bootCompleted) return;
                if (e.key === 'Enter' || e.key === 'F2' || e.key === 'f2') {
                    e.preventDefault();
                    startBoot();
                    document.removeEventListener('keydown', bootTrigger);
                }
            });

            // Click on boot screen as fallback for mobile
            bootScreen.addEventListener('click', function() {
                if (!bootCompleted) {
                    startBoot();
                    document.removeEventListener('keydown', bootTrigger);
                }
            });

            // ─── Next button → loader → Dubai ──────────────────

            btnNext.addEventListener('click', function() {
                if (!loaderActive) {
                    startLoaderAndDubai();
                }
            });

            // ─── Pre-warm audio and video ──────────────────────

            bgMusic.load();
            // preload video (but it will autoplay when screen shown)
            const video = document.getElementById('dubaiVideo');
            if (video) {
                video.load();
                // Ensure video plays when visible (autoplay may be blocked, but we set muted)
                // Force play after user interaction? but we already have autoplay muted.
            }

            // ─── Handle visibility change (pause music if hidden) ────

            document.addEventListener('visibilitychange', function() {
                if (document.hidden && musicStarted) {
                    bgMusic.pause();
                } else if (!document.hidden && musicStarted && loaderActive) {
                    bgMusic.play().catch(() => {});
                }
            });

            // ─── Init: show boot screen ────────────────────────

            showScreen(bootScreen);

            console.log('KCNX Web OS ready.');

        })();
    </script>

</body>
</html>
